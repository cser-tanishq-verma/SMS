spring:
  application:
    name: inventory-service
  # Config Server import disabled for local development
  # config:
  #   import: optional:configserver:http://localhost:8888

  # Fallback datasource configuration (used when Config Server is unavailable)
  datasource:
    # Local fallback: in-memory H2 for development
    url: jdbc:h2:mem:inventory_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  cloud:
    config:
      enabled: false
server:
  port: 8082


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
