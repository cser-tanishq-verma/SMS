spring:
  application:
    name: api-gateway
  # Config Server import disabled for local development
  # config:
  #   import: optional:configserver:http://config-server:8888
  cloud:
    config:
      enabled: false
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**

        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/api/requests/**

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

server:
  port: 8090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: stationeryManagementSecretKey2024StationeryApp

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    com.stationery.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
